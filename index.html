<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Magic Mirror</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/addons/p5.sound.min.js"></script>
  <script src="https://unpkg.com/ml5@1/dist/ml5.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      background: radial-gradient(circle at center, #2a0845 0%, #000000 100%);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      font-family: 'Quicksand', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }
    header {
      text-align: center;
      margin-top: 30px;
      margin-bottom: 20px;
      width: 100%;
    }
    h1 {
      font-family: 'Cinzel Decorative', cursive;
      font-size: 3rem;
      margin: 0 0 10px 0;
      color: #ffbaff;
      text-shadow: 0 0 20px #ff00ff, 0 0 40px #ff00ff;
    }
    .instructions {
      font-size: 1.1rem;
      color: #e0b0ff;
      max-width: 600px;
      margin: 0 auto;
      text-align: left;
      line-height: 1.6;
      background: rgba(255, 0, 255, 0.1);
      padding: 20px 30px;
      border-radius: 15px;
      border: 1px solid rgba(255, 0, 255, 0.3);
      box-shadow: 0 0 15px rgba(255, 0, 255, 0.2);
    }
    .instructions p {
      margin: 5px 0;
    }
    #canvas-container {
      position: relative;
      padding: 10px;
      background: linear-gradient(45deg, #ff00ff, #00ffff, #ff00ff);
      background-size: 400% 400%;
      animation: gradientBG 5s ease infinite;
      border-radius: 20px;
      box-shadow: 0 0 50px rgba(255, 0, 255, 0.5);
      margin-bottom: 20px;
      display: inline-block;
    }
    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    canvas {
      display: block;
      border-radius: 10px;
      background-color: #000;
      /* Ensures video doesn't overflow */
    }
  </style>
</head>
<body>
  <header>
    <h1>The Magic Mirror</h1>
    <div class="instructions">
      <p style="text-align: center; font-weight: bold; font-size: 1.2rem; margin-bottom: 10px;">✨ How to play ✨</p>
      <p><b>1. Create:</b> Type a magical item below and cast the spell to conjure your item into reality.</p>
      <p><b>2. Awaken:</b> Rapidly shake your newly created magic object back and forth to reveal your Fairy form!</p>
    </div>
  </header>
  
  <div id="canvas-container">
    <div id="p5-container"></div>
  </div>
  
  <script src="sketch.js"></script>
</body>
</html>
